<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resenha Futebol — Acha Racha</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #00C853;
    --verde-escuro: #007A33;
    --preto: #0A0A0A;
    --cinza-escuro: #141414;
    --cinza-medio: #1E1E1E;
    --cinza-borda: #2A2A2A;
    --branco: #F5F5F5;
    --amarelo: #FFD600;
    --laranja: #FF6B00;
    --texto-muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--preto);
    color: var(--branco);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(0,200,83,0.03) 60px, rgba(0,200,83,0.03) 62px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(0,200,83,0.03) 60px, rgba(0,200,83,0.03) 62px);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--cinza-borda);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    gap: 1rem;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    color: var(--verde);
    display: flex;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
  }

  .logo span { color: var(--branco); }
  .logo-ball { width: 28px; height: 28px; display: inline-flex; flex-shrink: 0; }

  nav { display: flex; gap: 0.5rem; }

  .nav-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--texto-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 0.5rem 1.2rem;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .nav-btn:hover { color: var(--branco); border-color: var(--cinza-borda); }
  .nav-btn.active { background: var(--verde); color: var(--preto); border-color: var(--verde); font-weight: 600; }

  .header-right { display: flex; align-items: center; gap: 0.6rem; }

  .lang-selector {
    display: flex;
    gap: 0.25rem;
    background: var(--cinza-medio);
    border: 1px solid var(--cinza-borda);
    border-radius: 999px;
    padding: 3px;
    position: relative;
  }

  .lang-btn {
    background: none;
    border: none;
    color: var(--texto-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 0.3rem 0.65rem;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .lang-btn:hover { color: var(--branco); }
  .lang-btn.active { background: var(--verde); color: var(--preto); }
  .lang-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .lang-spinner {
    width: 10px;
    height: 10px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: var(--preto);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  .lang-btn.loading .lang-spinner { display: inline-block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-anunciar {
    background: var(--verde);
    color: var(--preto);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.55rem 1.4rem;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .btn-anunciar:hover { background: #00E060; transform: scale(1.02); }

  /* HERO */
  .hero {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 5rem 2rem 3rem;
  }

  .hero-tag {
    display: inline-block;
    background: rgba(0,200,83,0.1);
    border: 1px solid rgba(0,200,83,0.3);
    color: var(--verde);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0.35rem 1rem;
    border-radius: 999px;
    margin-bottom: 1.5rem;
    animation: fadeInDown 0.6s ease both;
  }

  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 8vw, 7rem);
    line-height: 0.95;
    letter-spacing: 2px;
    animation: fadeInUp 0.7s 0.1s ease both;
  }

  .hero h1 em { font-style: normal; color: var(--verde); }

  .hero p {
    color: var(--texto-muted);
    font-size: 1.05rem;
    margin-top: 1.2rem;
    animation: fadeInUp 0.7s 0.2s ease both;
  }

  .stats-bar {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    gap: 3rem;
    padding: 1.5rem 2rem 2.5rem;
    animation: fadeInUp 0.7s 0.3s ease both;
  }

  .stat { text-align: center; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--verde); line-height: 1; }
  .stat-label { font-size: 0.75rem; color: var(--texto-muted); text-transform: uppercase; letter-spacing: 1px; }

  .filter-section {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto 3rem;
    padding: 0 1.5rem;
    animation: fadeInUp 0.7s 0.4s ease both;
  }

  .filter-card {
    background: var(--cinza-escuro);
    border: 1px solid var(--cinza-borda);
    border-radius: 20px;
    padding: 1.8rem;
  }

  .filter-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--verde);
    font-weight: 600;
    margin-bottom: 1.2rem;
  }

  .filter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 0.8rem;
    margin-bottom: 1.2rem;
  }

  .filter-group label {
    display: block;
    font-size: 0.72rem;
    color: var(--texto-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.4rem;
    font-weight: 500;
  }

  .filter-group select,
  .filter-group input {
    width: 100%;
    background: var(--cinza-medio);
    border: 1px solid var(--cinza-borda);
    color: var(--branco);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.65rem 0.9rem;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    cursor: pointer;
  }

  .filter-group select:focus,
  .filter-group input:focus { border-color: var(--verde); }
  .filter-group select option { background: #1E1E1E; }

  .posicoes-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.2rem;
  }

  .pos-btn {
    background: var(--cinza-medio);
    border: 1px solid var(--cinza-borda);
    color: var(--texto-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 0.4rem 0.9rem;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .pos-btn:hover { border-color: var(--verde); color: var(--verde); }
  .pos-btn.selected { background: var(--verde); border-color: var(--verde); color: var(--preto); }

  .filter-actions { display: flex; gap: 0.8rem; justify-content: flex-end; }

  .btn-limpar {
    background: none;
    border: 1px solid var(--cinza-borda);
    color: var(--texto-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.65rem 1.4rem;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-limpar:hover { border-color: var(--branco); color: var(--branco); }

  .btn-buscar {
    background: var(--verde);
    border: none;
    color: var(--preto);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    padding: 0.65rem 2rem;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-buscar:hover { background: #00E060; }

  .tabs-section {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }

  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--cinza-borda);
    margin-bottom: 1.5rem;
  }

  .tab {
    background: none;
    border: none;
    color: var(--texto-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 0.8rem 1.5rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
  }

  .tab.active { color: var(--verde); border-bottom-color: var(--verde); font-weight: 600; }
  .tab:hover:not(.active) { color: var(--branco); }

  .result-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    font-size: 0.85rem;
    color: var(--texto-muted);
  }

  .result-count strong { color: var(--branco); }

  .sort-select {
    background: var(--cinza-medio);
    border: 1px solid var(--cinza-borda);
    color: var(--branco);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 0.3rem 0.6rem;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
  }

  .cards-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding-bottom: 4rem;
  }

  .jogo-card {
    background: var(--cinza-escuro);
    border: 1px solid var(--cinza-borda);
    border-radius: 16px;
    padding: 1.4rem 1.6rem;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 1.2rem;
    align-items: center;
    transition: all 0.2s;
    cursor: pointer;
    animation: fadeInUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .jogo-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--verde);
    border-radius: 3px 0 0 3px;
  }

  .jogo-card.urgente::before { background: var(--laranja); }
  .jogo-card.cheio::before { background: var(--texto-muted); }

  .jogo-card:hover {
    border-color: rgba(0,200,83,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,200,83,0.08);
  }

  .jogo-card.cheio:hover { border-color: var(--cinza-borda); transform: none; box-shadow: none; }

  .card-data { text-align: center; min-width: 72px; }
  .card-dia { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; line-height: 1; color: var(--verde); }
  .card-mes { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--texto-muted); }
  .card-hora { font-size: 0.85rem; font-weight: 600; color: var(--branco); margin-top: 0.3rem; }

  .card-info { min-width: 0; }
  .card-titulo { font-size: 1rem; font-weight: 600; color: var(--branco); margin-bottom: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-local { font-size: 0.82rem; color: var(--texto-muted); margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.3rem; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }

  .tag {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    border: 1px solid;
  }

  .tag-nivel-basico { color: #4FC3F7; border-color: rgba(79,195,247,0.3); background: rgba(79,195,247,0.08); }
  .tag-nivel-intermediario { color: var(--amarelo); border-color: rgba(255,214,0,0.3); background: rgba(255,214,0,0.08); }
  .tag-nivel-avancado { color: var(--laranja); border-color: rgba(255,107,0,0.3); background: rgba(255,107,0,0.08); }
  .tag-tipo { color: var(--verde); border-color: rgba(0,200,83,0.3); background: rgba(0,200,83,0.08); }
  .tag-pos { color: #CE93D8; border-color: rgba(206,147,216,0.3); background: rgba(206,147,216,0.08); }

  .card-vagas { text-align: right; }
  .vagas-num { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; line-height: 1; color: var(--verde); }
  .vagas-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--texto-muted); }

  .btn-entrar {
    display: block;
    margin-top: 0.6rem;
    background: var(--verde);
    border: none;
    color: var(--preto);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 0.4rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .btn-entrar:hover { background: #00E060; }
  .btn-entrar.cheio-btn { background: var(--cinza-borda); color: var(--texto-muted); cursor: not-allowed; }

  .badge-urgente {
    position: absolute;
    top: 0.5rem; left: 0.8rem;
    background: var(--laranja);
    color: white;
    font-size: 0.55rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0.1rem 0.4rem;
    border-radius: 999px;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--cinza-escuro);
    border: 1px solid var(--cinza-borda);
    border-radius: 20px;
    padding: 2rem;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: none; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.8rem;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--verde);
    letter-spacing: 1px;
  }

  .modal-close {
    background: var(--cinza-medio);
    border: 1px solid var(--cinza-borda);
    color: var(--texto-muted);
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover { color: var(--branco); border-color: var(--branco); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-group.full { grid-column: 1 / -1; }

  .form-group label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--texto-muted);
    font-weight: 600;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--cinza-medio);
    border: 1px solid var(--cinza-borda);
    color: var(--branco);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.7rem 0.9rem;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--verde); }
  .form-group select option { background: #1e1e1e; }

  .posicoes-form { display: flex; flex-wrap: wrap; gap: 0.4rem; }

  .pos-form-btn {
    background: var(--cinza-medio);
    border: 1px solid var(--cinza-borda);
    color: var(--texto-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.35rem 0.8rem;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .pos-form-btn.selected { background: rgba(206,147,216,0.15); border-color: #CE93D8; color: #CE93D8; }

  .btn-publicar {
    width: 100%;
    background: var(--verde);
    border: none;
    color: var(--preto);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.9rem;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: all 0.2s;
  }

  .btn-publicar:hover { background: #00E060; }

  .detalhe-header {
    background: linear-gradient(135deg, var(--verde-escuro), #004d20);
    padding: 2rem;
    border-radius: 12px 12px 0 0;
    margin: -2rem -2rem 1.5rem;
  }

  .detalhe-nome { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 1px; }
  .detalhe-local { color: rgba(255,255,255,0.7); font-size: 0.9rem; margin-top: 0.3rem; }

  .detalhe-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .detalhe-item {
    background: var(--cinza-medio);
    border: 1px solid var(--cinza-borda);
    border-radius: 10px;
    padding: 0.8rem;
    text-align: center;
  }

  .detalhe-item-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--verde); }
  .detalhe-item-key { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--texto-muted); margin-top: 0.2rem; }

  .detalhe-descricao {
    background: var(--cinza-medio);
    border-radius: 10px;
    padding: 1rem;
    font-size: 0.88rem;
    color: var(--texto-muted);
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }

  .detalhe-posicoes { margin-bottom: 1.5rem; }
  .detalhe-posicoes h4 {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--texto-muted);
    margin-bottom: 0.7rem;
    font-weight: 600;
  }

  .btn-confirmar {
    width: 100%;
    background: var(--verde);
    border: none;
    color: var(--preto);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.9rem;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-confirmar:hover { background: #00E060; }

  /* OVERLAY DE TRADUÇÃO */
  .translate-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.7);
    z-index: 300;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    backdrop-filter: blur(4px);
  }

  .translate-overlay.show { display: flex; }

  .translate-spinner {
    width: 48px; height: 48px;
    border: 3px solid rgba(0,200,83,0.2);
    border-top-color: var(--verde);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .translate-msg {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--texto-muted);
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--verde);
    color: var(--preto);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    padding: 0.8rem 2rem;
    border-radius: 999px;
    z-index: 500;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .empty-state { text-align: center; padding: 4rem 2rem; }
  .empty-ball { font-size: 4rem; margin-bottom: 1rem; animation: bounce 1.5s ease infinite; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .empty-state h3 { font-size: 1.2rem; color: var(--texto-muted); font-weight: 400; }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-15px); }
    to { opacity: 1; transform: none; }
  }

// ===================== CACHE DE TRADUÇÕES =====================
// Guarda as traduções já feitas pra não chamar a API de novo
const cache = {
  pt: { ...textosPT }
  // en e es serão preenchidos automaticamente pela API
};

let currentLang = 'pt';
let traducaoAtual = { ...textosPT };

// ===================== API MYMEMORY =====================
async function traduzirTexto(texto, destino) {
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(texto)}&langpair=pt|${destino}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.responseStatus === 200) {
      return data.responseData.translatedText;
    }
    return texto; // fallback: retorna o original se der erro
  } catch {
    return texto;
  }
}

// Traduz todas as chaves de uma vez, em lotes pra não sobrecarregar a API
async function traduzirTudo(destino) {
  // Se já temos no cache, usa direto
  if (cache[destino]) {
    return cache[destino];
  }

  const chaves = Object.keys(textosPT);
  const resultado = {};

  // Processa em lotes de 5 pra não travar o navegador
  const tamanhoLote = 5;
  for (let i = 0; i < chaves.length; i += tamanhoLote) {
    const lote = chaves.slice(i, i + tamanhoLote);
    const promises = lote.map(chave =>
      traduzirTexto(textosPT[chave], destino).then(tr => ({ chave, tr }))
    );
    const respostas = await Promise.all(promises);
    respostas.forEach(({ chave, tr }) => {
      resultado[chave] = tr;
    });
  }

  cache[destino] = resultado;
  return resultado;
}

// ===================== APLICAR TRADUÇÃO NA TELA =====================
function aplicarTraducao(traducoes) {
  traducaoAtual = traducoes;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const chave = el.getAttribute('data-i18n');
    if (traducoes[chave] !== undefined) {
      el.textContent = traducoes[chave];
    }
  });
  aplicarTab(); // re-renderiza os cards com os novos textos
}

// Atalho pra pegar tradução atual
function t(chave) {
  return traducaoAtual[chave] || textosPT[chave] || chave;
}

// ===================== TROCAR IDIOMA =====================
async function setLang(lang) {
  if (lang === currentLang) return;

  const botao = document.querySelector(`.lang-btn:nth-child(${lang === 'pt' ? 1 : lang === 'en' ? 2 : 3})`);

  if (lang === 'pt') {
    // PT não precisa de API — usa os textos originais
    currentLang = 'pt';
    document.documentElement.lang = 'pt-BR';
    atualizarBotoesLang('pt');
    aplicarTraducao(textosPT);
    return;
  }

  // Mostra loading no botão e no overlay
  if (botao) {
    botao.disabled = true;
    botao.classList.add('loading');
  }

  const destino = lang === 'en' ? 'en' : 'es';
  const msgOverlay = lang === 'en' ? 'Translating...' : 'Traduciendo...';

  // Se ainda não tem no cache, mostra o overlay de carregamento
  if (!cache[lang]) {
    document.getElementById('translate-msg').textContent = t('traduzindo');
    document.getElementById('translate-overlay').classList.add('show');
  }

  try {
    const traducoes = await traduzirTudo(destino);
    currentLang = lang;
    document.documentElement.lang = lang;
    atualizarBotoesLang(lang);
    aplicarTraducao(traducoes);
  } catch (err) {
    mostrarToast('Erro ao traduzir. Verifique sua conexão.', true);
  } finally {
    document.getElementById('translate-overlay').classList.remove('show');
    if (botao) {
      botao.disabled = false;
      botao.classList.remove('loading');
    }
  }
}

function atualizarBotoesLang(lang) {
  document.querySelectorAll('.lang-btn').forEach(b => {
    const langDoBotao = b.textContent.trim().replace(/\s+.*/, '').toLowerCase();
    b.classList.toggle('active', langDoBotao === lang);
  });
}

  const d = new Date(hoje);
  d.setDate(d.getDate() + diasAFrente);
  return { obj: d, str: d.toISOString().split('T')[0], hora };
}

];

let tabAtual = 'todos';
let jogosFiltrados = [...jogos];

// ===================== RENDER =====================
function getNivelClass(nivel) {
  if (nivel === 'Básico') return 'tag-nivel-basico';
  if (nivel === 'Intermediário') return 'tag-nivel-intermediario';
  if (nivel === 'Avançado') return 'tag-nivel-avancado';
  return 'tag-nivel-basico';
}

function getNivelLabel(nivel) {
  const map = { 'Básico':'nivel_basico', 'Intermediário':'nivel_intermediario', 'Avançado':'nivel_avancado' };
  return t(map[nivel] || 'nivel_basico');
}

function getPosLabel(pos) {
  const map = {
    'Goleiro':'pos_goleiro','Zagueiro':'pos_zagueiro','Lateral':'pos_lateral',
    'Volante':'pos_volante','Meia':'pos_meia','Ponta':'pos_ponta',
    'Centroavante':'pos_centroavante','Qualquer':'pos_qualquer'
  };
  return map[pos] ? t(map[pos]) : pos;
}

function renderCards(lista) {
  const container = document.getElementById('cards-container');
  document.getElementById('total-count').textContent = lista.length;

  if (lista.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-ball">⚽</div>
        <h3>${t('empty_title')}</h3>
      </div>`;
    return;
  }

  container.innerHTML = lista.map((j, i) => {
    const cheio = j.vagas === 0;
    const tagNivel = getNivelClass(j.nivel);
    const nivelLabel = getNivelLabel(j.nivel);
    const posStr = j.posicoes.length
      ? j.posicoes.slice(0,2).map(p => getPosLabel(p)).join(', ') + (j.posicoes.length > 2 ? '...' : '')
      : '';

    return `
    <div class="jogo-card ${j.urgente?'urgente':''} ${cheio?'cheio':''}"
         style="animation-delay:${i*0.05}s"
         onclick="abrirDetalhe(${j.id})">
      ${j.urgente ? `<span class="badge-urgente">${t('badge_urgente')}</span>` : ''}
      <div class="card-data">
        <div class="card-dia">${j.data.obj.getDate().toString().padStart(2,'0')}</div>
        <div class="card-mes">${j.data.obj.toLocaleString('pt-BR',{month:'short'}).replace('.','')}</div>
        <div class="card-hora">${j.data.hora}</div>
      </div>
      <div class="card-info">
        <div class="card-titulo">${j.nome}</div>
        <div class="card-local">📍 ${j.local} &bull; ${j.cidade}</div>
        <div class="card-tags">
          <span class="tag ${tagNivel}">${nivelLabel}</span>
          <span class="tag tag-tipo">${j.tipo}</span>
          ${posStr ? `<span class="tag tag-pos">🦵 ${posStr}</span>` : ''}
        </div>
      </div>
      <div class="card-vagas">
        <div class="vagas-num" style="${cheio?'color:var(--texto-muted)':''}">
          ${cheio ? '—' : j.vagas}
        </div>
        <div class="vagas-label">${cheio ? t('btn_lotado') : t('vagas_label')}</div>
        <button class="btn-entrar ${cheio?'cheio-btn':''}"
          onclick="event.stopPropagation(); ${cheio ? '' : `abrirDetalhe(${j.id})`}">
          ${cheio ? t('btn_lotado') : t('btn_entrar')}
        </button>
      </div>
    </div>`;
  }).join('');
}

// ===================== FILTROS =====================
function buscar() {
  const cidade = document.getElementById('f-cidade').value;
  const data = document.getElementById('f-data').value;
  const horario = document.getElementById('f-horario').value;
  const nivelSel = document.getElementById('f-nivel').value;
  const posSelected = [...document.querySelectorAll('#posicoes-filtro .pos-btn.selected')].map(b => b.getAttribute('data-pos'));

  // Monta mapa de nível traduzido → PT original
  const nivelMap = {
    [t('nivel_basico')]: 'Básico',
    [t('nivel_intermediario')]: 'Intermediário',
    [t('nivel_avancado')]: 'Avançado',
  };
  const nivelPT = nivelMap[nivelSel] || nivelSel;

  jogosFiltrados = jogos.filter(j => {
    if (cidade && j.cidade !== cidade) return false;
    if (data && j.data.str !== data) return false;
    if (nivelSel && j.nivel !== nivelPT) return false;
    if (horario) {
      const h = parseInt(j.data.hora);
      if (horario === t('opt_manha') && h >= 12) return false;
      if (horario === t('opt_tarde') && (h < 12 || h >= 18)) return false;
      if (horario === t('opt_noite') && h < 18) return false;
    }
    if (posSelected.length > 0 && !posSelected.includes('Qualquer')) {
      const temPos = posSelected.some(p => j.posicoes.includes(p) || j.posicoes.includes('Qualquer'));
      if (!temPos) return false;
    }
    return true;
  });

  aplicarTab();
  mostrarToast(`${jogosFiltrados.length} ${t('toast_encontrados')}`);
}

function aplicarTab() {
  let lista = [...jogosFiltrados];
  const fim = new Date(); fim.setDate(fim.getDate() + 7);

  if (tabAtual === 'hoje') lista = lista.filter(j => j.data.str === hoje.toISOString().split('T')[0]);
  else if (tabAtual === 'semana') lista = lista.filter(j => j.data.obj <= fim);
  else if (tabAtual === 'urgente') lista = lista.filter(j => j.urgente || j.vagas <= 2);

  renderCards(lista);
}

function limparFiltros() {
  document.getElementById('f-cidade').value = '';
  document.getElementById('f-data').value = '';
  document.getElementById('f-horario').value = '';
  document.getElementById('f-nivel').value = '';
  document.querySelectorAll('#posicoes-filtro .pos-btn').forEach(b => b.classList.remove('selected'));
  jogosFiltrados = [...jogos];
  aplicarTab();
}

function togglePos(btn) { btn.classList.toggle('selected'); }
function togglePosForm(btn) { btn.classList.toggle('selected'); }

function mudarTab(btn, tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  tabAtual = tab;
  aplicarTab();
}

function mudarAba(aba) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (aba === 'meus') {
    const meus = jogos.filter(j => j._meu);
    meus.length === 0 ? mostrarToast(t('toast_sem_jogos')) : renderCards(meus);
  } else {
    aplicarTab();
  }
}

function ordenar(criterio) {
  if (criterio === 'data') jogosFiltrados.sort((a,b) => a.data.obj - b.data.obj);
  if (criterio === 'vagas') jogosFiltrados.sort((a,b) => b.vagas - a.vagas);
  if (criterio === 'nivel') {
    const ordem = {'Básico':0,'Intermediário':1,'Avançado':2};
    jogosFiltrados.sort((a,b) => ordem[a.nivel] - ordem[b.nivel]);
  }
  aplicarTab();
}

// ===================== MODAL ANUNCIAR =====================
function abrirModalAnunciar() {
  document.getElementById('modal-anunciar').classList.add('open');
  document.getElementById('an-data').value = hoje.toISOString().split('T')[0];
}

function publicarJogo() {
  const nome  = document.getElementById('an-nome').value.trim();
  const cidade = document.getElementById('an-cidade').value;
  const local = document.getElementById('an-local').value.trim();
  const dataVal = document.getElementById('an-data').value;
  const hora  = document.getElementById('an-hora').value;
  const tipo  = document.getElementById('an-tipo').value;
  const nivel = document.getElementById('an-nivel').value;
  const vagas = parseInt(document.getElementById('an-vagas').value) || 3;
  const desc  = document.getElementById('an-desc').value.trim();
  const posicoes = [...document.querySelectorAll('#posicoes-form .pos-form-btn.selected')].map(b => b.getAttribute('data-pos'));

  // Converte nível traduzido → PT original
  const nivelMap = {
    [t('nivel_basico')]: 'Básico',
    [t('nivel_intermediario')]: 'Intermediário',
    [t('nivel_avancado')]: 'Avançado',
  };
  const nivelPT = nivelMap[nivel] || nivel;

  if (!nome || !local || !dataVal || !hora) {
    mostrarToast(t('toast_campos'), true);
    return;
  }

  const novoJogo = {
    id: Date.now(), nome, cidade, local,
    data: { obj: new Date(dataVal + 'T' + hora), str: dataVal, hora },
    nivel: nivelPT, tipo, vagas, totalVagas: vagas + 11,
    posicoes: posicoes.length ? posicoes : ['Qualquer'],
    desc: desc || 'Venha jogar conosco!',
    urgente: false, contato: 'Direto no app', _meu: true
  };

  jogos.unshift(novoJogo);
  jogosFiltrados = [...jogos];
  fecharModal('modal-anunciar');
  aplicarTab();
  mostrarToast('⚽ ' + t('toast_publicado'));

  document.getElementById('an-nome').value = '';
  document.getElementById('an-local').value = '';
  document.getElementById('an-hora').value = '';
  document.getElementById('an-desc').value = '';
  document.getElementById('an-vagas').value = '3';
  document.querySelectorAll('#posicoes-form .pos-form-btn').forEach(b => b.classList.remove('selected'));
}

// ===================== MODAL DETALHE =====================
function abrirDetalhe(id) {
  const j = jogos.find(x => x.id === id);
  if (!j) return;

  const cheio = j.vagas === 0;
  const tagNivel = getNivelClass(j.nivel);
  const nivelLabel = getNivelLabel(j.nivel);
  const diaSemana = j.data.obj.toLocaleString('pt-BR', {weekday:'long'});
  const dataFull  = j.data.obj.toLocaleString('pt-BR', {day:'2-digit',month:'long',year:'numeric'});

  document.getElementById('modal-detalhe-body').innerHTML = `
    <div class="detalhe-header">
      <div class="card-tags" style="margin-bottom:0.7rem">
        <span class="tag ${tagNivel}">${nivelLabel}</span>
        <span class="tag tag-tipo">${j.tipo}</span>
        ${j.urgente ? `<span class="tag" style="color:var(--laranja);border-color:rgba(255,107,0,.3);background:rgba(255,107,0,.08)">${t('badge_urgente')}</span>` : ''}
      </div>
      <div class="detalhe-nome">${j.nome}</div>
      <div class="detalhe-local">📍 ${j.local} &bull; ${j.cidade}</div>
    </div>

    <div class="detalhe-grid">
      <div class="detalhe-item">
        <div class="detalhe-item-val">${j.data.hora}</div>
        <div class="detalhe-item-key">${t('detalhe_horario')}</div>
      </div>
      <div class="detalhe-item">
        <div class="detalhe-item-val" style="${cheio?'color:var(--texto-muted)':''}">${cheio?'—':j.vagas}</div>
        <div class="detalhe-item-key">${cheio ? t('detalhe_lotado') : t('detalhe_vagas')}</div>
      </div>
      <div class="detalhe-item">
        <div class="detalhe-item-val">${j.totalVagas}</div>
        <div class="detalhe-item-key">${t('detalhe_total')}</div>
      </div>
    </div>

    <div class="detalhe-descricao">
      📅 <strong>${diaSemana.charAt(0).toUpperCase()+diaSemana.slice(1)}, ${dataFull}</strong><br><br>
      ${j.desc}
    </div>

    <div class="detalhe-posicoes">
      <h4>${t('detalhe_posicoes')}</h4>
      <div class="posicoes-grid">
        ${j.posicoes.map(p => `<button class="pos-btn selected" style="pointer-events:none">${getPosLabel(p)}</button>`).join('')}
      </div>
    </div>

    <div style="background:var(--cinza-medio);border:1px solid var(--cinza-borda);border-radius:10px;padding:0.8rem 1rem;margin-bottom:1.2rem;font-size:0.85rem">
      📱 <strong>${t('detalhe_contato')}:</strong> ${j.contato}
    </div>

    ${cheio
      ? `<button class="btn-confirmar" style="background:var(--cinza-borda);color:var(--texto-muted);cursor:not-allowed">${t('btn_vagas_esgotadas')}</button>`
      : `<button class="btn-confirmar" onclick="confirmarEntrada(${j.id})">✅ ${t('btn_quero_jogar')}</button>`
    }
  `;

  document.getElementById('modal-detalhe').classList.add('open');
}

function confirmarEntrada(id) {
  const j = jogos.find(x => x.id === id);
  if (j && j.vagas > 0) {
    j.vagas--;
    fecharModal('modal-detalhe');
    aplicarTab();
    mostrarToast('⚽ ' + t('toast_entrou'));
  }
}

// ===================== UTILS =====================
function fecharModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

function mostrarToast(msg, erro) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = erro ? '#ff4444' : 'var(--verde)';
  el.style.color = erro ? '#fff' : 'var(--preto)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ===================== INIT =====================
document.getElementById('f-data').min = hoje.toISOString().split('T')[0];
jogosFiltrados = [...jogos];
aplicarTab();
</script>
